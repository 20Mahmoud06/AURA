name: aura
description: Media Player
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^17.1.0

  # State Management
  fpdart: ^1.2.0
  equatable: ^2.0.7
  flutter_bloc: ^9.1.1

  # Storage
  shared_preferences: ^2.5.4

  # Responsive UI
  flutter_screenutil: ^5.9.3

  # Animations
  flutter_animate: ^4.5.2

  # Environment
  flutter_dotenv: ^6.0.0

  # Deep Links
  app_links: ^6.3.0

  # Utilities
  permission_handler: ^12.0.1

  flutter_native_splash: ^2.4.7
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_android_video: ^1.3.8
  on_audio_query: ^2.9.0
  photo_manager: ^3.9.0
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.5
  path: ^1.9.1
  video_thumbnail: ^0.5.6
  just_audio: ^0.10.5
  just_audio_background: ^0.0.1-beta.17

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  isar_generator: ^3.1.0+1

  # Code Generation

dependency_overrides:

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/
    - assets/icons/
    - assets/translations/
    - assets/fonts/
    - .env
  fonts:
    - family: Sora
      fonts:
        - asset: assets/fonts/Sora-Regular.ttf
